<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <defs>
    <!-- Ocean gradient -->
    <linearGradient id="oceanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d8aaf"/>
      <stop offset="100%" stop-color="#085369"/>
    </linearGradient>
    <!-- Sunset gradient -->
    <linearGradient id="sunsetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5af69"/>
      <stop offset="100%" stop-color="#e8923f"/>
    </linearGradient>
    <!-- Sand gradient -->
    <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5ebd7"/>
      <stop offset="100%" stop-color="#ebd7af"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="120" cy="120" r="116" fill="url(#oceanGrad)"/>
  <circle cx="120" cy="120" r="114" stroke="#fdfaf5" stroke-width="4" fill="none" opacity="0.6"/>

  <!-- Sun -->
  <circle cx="120" cy="98" r="38" fill="url(#sunsetGrad)" opacity="0.9"/>
  <circle cx="120" cy="98" r="28" fill="#f5af69" opacity="0.6"/>

  <!-- Ocean waves -->
  <path d="M0 140 Q30 132 60 140 Q90 148 120 140 Q150 132 180 140 Q210 148 240 140 L240 180 Q210 172 180 180 Q150 188 120 180 Q90 172 60 180 Q30 188 0 180Z" fill="#085369" opacity="0.7"/>
  <path d="M0 155 Q40 148 80 155 Q120 162 160 155 Q200 148 240 155 L240 190 Q200 183 160 190 Q120 197 80 190 Q40 183 0 190Z" fill="#339fbf" opacity="0.5"/>
  <path d="M0 170 Q35 165 70 170 Q105 175 140 170 Q175 165 210 170 Q240 174 240 170 L240 200 Q200 195 160 200 Q120 205 80 200 Q40 195 0 200Z" fill="#e6f3f7" opacity="0.3"/>

  <!-- Palm tree silhouette -->
  <g transform="translate(82, 95)">
    <rect x="-2" y="20" width="4" height="38" rx="2" fill="#7d5f2c"/>
    <ellipse cx="-12" cy="14" rx="22" ry="6" fill="#7d5f2c" transform="rotate(-25, -12, 14)" opacity="0.8"/>
    <ellipse cx="4" cy="10" rx="20" ry="5" fill="#5a411a" transform="rotate(10, 4, 10)" opacity="0.8"/>
    <ellipse cx="14" cy="16" rx="16" ry="4.5" fill="#7d5f2c" transform="rotate(-15, 14, 16)" opacity="0.7"/>
  </g>

  <!-- Small bird silhouettes -->
  <path d="M168 82 Q172 77 176 82" stroke="#fdfaf5" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M178 76 Q182 71 186 76" stroke="#fdfaf5" stroke-width="1.2" fill="none" opacity="0.35"/>

  <!-- BAPATLA text -->
  <text x="120" y="208" text-anchor="middle" font-family="'Geist', 'Inter', system-ui, sans-serif" font-weight="800" font-size="26" fill="#fdfaf5" letter-spacing="6">BAPATLA</text>

  <!-- BEACH text -->
  <text x="120" y="230" text-anchor="middle" font-family="'Geist', 'Inter', system-ui, sans-serif" font-weight="400" font-size="16" fill="#f5af69" letter-spacing="4">BEACH</text>
</svg>
